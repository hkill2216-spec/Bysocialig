        }
        .shayari-card:hover { transform: translateY(-5px); }

        .btn {

            border-radius: 50px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            text-decoration: none;
        }
        .btn-copy { background: #ffc107; color: #000; }
        .btn-share { background: #25d366; color: #fff; }
        .btn:active { transform: scale(0.9); }

        /* Colors for Cards */
        .c-red { border-color: #ff4757; }
        .c-blue { border-color: #1e90ff; }
        .c-green { border-color: #2ed573; }
        .c-purple { border-color: #a55eea; }
        .c-orange { border-color: #ffa502; }
        .c-pink { border-color: #ff6b81; }
